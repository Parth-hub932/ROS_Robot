ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link

    # Topics
    odom0: /mecanum_drive_controller/odom
    imu0: /imu/data

    # What to use from wheel odometry
    odom0_config:  [false, false, false,
                    false, false, false,
                    true,  true,  false,
                    false, false, true,
                    false, false, false]

    # What to use from IMU
    imu0_config:   [false, false, false,
                    false, false, true,
                    false, false, false,
                    false, false, true,
                    true,  false, false]

    odom0_queue_size: 5
    odom0_pose_rejection_threshold: 2.0

    imu0_queue_size: 50
    imu0_remove_gravitational_acceleration: true

    odom0_differential: false
    imu0_differential: false
