controller_manager:
  ros__parameters:
    # SYNCHRONIZATION FIX:
    # Matches PSoC Encoder Task (20ms = 50Hz)
    update_rate: 25

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_base_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_base_controller:
  ros__parameters:
    # --- Frame IDs ---
    base_frame_id: "base_link"
    odom_frame_id: "odom"

    # --- INPUT CONFIGURATION (The Fix) ---
    # Critical: Forces controller to accept unstamped Twist messages from PID node
    use_stamped_vel: false

    # --- KINEMATICS GROUP ---
    kinematics:
      base_frame_offset: {x: 0.0, y: 0.0, theta: 0.0}
     
      # MEASURED: 48.5mm Radius
      wheels_radius: 0.0485
     
      # MEASURED: (0.195 + 0.207) / 2 = 0.201
      sum_of_robot_center_projection_on_X_Y_axis: 0.201

    # --- Standard Params (For safety/legacy) ---
    wheel_separation_x: 0.195
    wheel_separation_y: 0.207
    wheel_radius: 0.0485

    # --- Wheel Names ---
    # Ensure these match your URDF joints exactly
    front_left_wheel_command_joint_name: "fl_wheel_joint"
    front_right_wheel_command_joint_name: "fr_wheel_joint"
    rear_left_wheel_command_joint_name: "rl_wheel_joint"
    rear_right_wheel_command_joint_name: "rr_wheel_joint"

    front_left_wheel_state_joint_name: "fl_wheel_joint"
    front_right_wheel_state_joint_name: "fr_wheel_joint"
    rear_left_wheel_state_joint_name: "rl_wheel_joint"
    rear_right_wheel_state_joint_name: "rr_wheel_joint"

    # --- Odometry Config ---
    open_loop: false
    enable_odom_tf: true
   
    # Twist Covariance (Diagonal)
    # [Vx, Vy, Vz, Vroll, Vpitch, Vyaw]
    # We trust the math (0.001) but let EKF handle the slip.
    twist_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.01]
   
    # Pose Covariance
    # [x, y, z, roll, pitch, yaw]
    pose_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.01]