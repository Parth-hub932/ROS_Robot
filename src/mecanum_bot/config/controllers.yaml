controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: false

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_base_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_base_controller:
  ros__parameters:
    # Frame IDs
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    
    # --- KINEMATICS GROUP (Nested as per error message) ---
    kinematics:
      base_frame_offset: {x: 0.0, y: 0.0, theta: 0.0}
      wheels_radius: 0.0485      # <--- Error mentioned this exact name
      sum_of_robot_center_projection_on_X_Y_axis: 0.449 # (separation_x + separation_y)

    # Standard flat params just in case (Legacy support)
    wheel_separation_x: 0.200
    wheel_separation_y: 0.249
    wheel_radius: 0.0485

    # Wheel Names (Verbose is safer)
    front_left_wheel_command_joint_name: "fl_wheel_joint"
    front_right_wheel_command_joint_name: "fr_wheel_joint"
    rear_left_wheel_command_joint_name: "rl_wheel_joint"
    rear_right_wheel_command_joint_name: "rr_wheel_joint"
    
    front_left_wheel_state_joint_name: "fl_wheel_joint"
    front_right_wheel_state_joint_name: "fr_wheel_joint"
    rear_left_wheel_state_joint_name: "rl_wheel_joint"
    rear_right_wheel_state_joint_name: "rr_wheel_joint"

    # Odometry
    open_loop: false      
    enable_odom_tf: true
    use_stamped_vel: false