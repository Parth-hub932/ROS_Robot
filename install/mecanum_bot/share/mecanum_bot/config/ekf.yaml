### ekf.yaml ###
ekf_filter_node:
  ros__parameters:
    # --- PERFORMANCE TUNING ---
    # We aim for 30 Hz as a stable target after switching to Release Mode
    frequency: 30.0       
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true

    # --- FRAMES ---
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # --- 1. WHEEL ODOMETRY (Mecanum) ---
    # Trust: Vx, Vy, Vz_rotation 
    odom0: /mecanum_base_controller/odometry
    odom0_config: [true, true, false,
               false, false, true,
               true, true, false,
               false, false, true,
               false, false, false]

    odom0_queue_size: 10
    odom0_differential: false

    # --- 2. IMU DATA (FINAL CONFIGURATION) ---
    # Trust: ONLY Yaw (Index 5). All other IMU data is unreliable and ignored.
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,    # CHANGED: Yaw (Orientation) is now TRUE (Trusted)
                  false, false, false,
                  false, false, false,   # CHANGED: Gyro Velocity (Vyaw) is FALSE (Removed)
                  false, false, false]   # Linear Acceleration is FALSE (Removed)
    imu0_queue_size: 10
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true